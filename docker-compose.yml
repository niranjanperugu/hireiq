version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hiresmart-db
    environment:
      POSTGRES_USER: hiresmart_user
      POSTGRES_PASSWORD: hiresmart_secure_password
      POSTGRES_DB: hiresmart_db
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hiresmart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresmart_user -d hiresmart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiresmart-api
    env_file:
      - .env.docker
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hiresmart_db
      SPRING_DATASOURCE_USERNAME: hiresmart_user
      SPRING_DATASOURCE_PASSWORD: hiresmart_secure_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_LIQUIBASE_ENABLED: "false"
      JWT_SECRET: dev-secret-key-for-hiresmart-demo-application-change-in-production-2024
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost"
      SERVER_PORT: 8080
      # AWS / Anthropic keys come from .env.docker (env_file above) — do NOT set them
      # here with ${VAR:-} because an empty host-env value would override env_file.
      ANTHROPIC_MODEL: claude-haiku-4-5-20251001
      ANTHROPIC_MAX_TOKENS: "8000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hiresmart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hiresmart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Nginx Reverse Proxy (Optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: hiresmart-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - hiresmart-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  hiresmart-network:
    driver: bridge
