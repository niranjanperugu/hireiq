# ============================================================================
# HireSmart Spring Boot Configuration
# ============================================================================

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Virtual threads (Java 21 Project Loom)
# Tomcat request threads + @Async tasks all use virtual threads automatically
spring.threads.virtual.enabled=true

# Spring Application Name
spring.application.name=hiresmart

# ============================================================================
# Database Configuration
# ============================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/hiresmart
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# Liquibase Database Migration
# ============================================================================
spring.liquibase.enabled=false

# ============================================================================
# JWT Configuration
# ============================================================================
app.jwt.secret=${JWT_SECRET:dev-secret-key-for-hiresmart-demo-application-change-in-production-2024}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================================
# Security Configuration
# ============================================================================
spring.security.filter.order=5
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin}

# ============================================================================
# AWS Configuration
# ============================================================================
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET:hiresmart-resumes}
aws.s3.endpoint=${AWS_S3_ENDPOINT:https://s3.amazonaws.com}
aws.ses.sender-email=${AWS_SES_EMAIL:noreply@hiresmart.com}
aws.cloudwatch.namespace=HireSmartMetrics

# ============================================================================
# Anthropic Claude API Configuration
# ============================================================================
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.base-url=https://api.anthropic.com
anthropic.api.model=${ANTHROPIC_MODEL:claude-sonnet-4-6}
anthropic.api.max-tokens=${ANTHROPIC_MAX_TOKENS:8000}

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.hiresmart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/hiresmart.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================================================
# Jackson Configuration
# ============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ============================================================================
# Cache Configuration
# ============================================================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=10m

# ============================================================================
# Mail Configuration (AWS SES)
# ============================================================================
spring.mail.host=email.${aws.region:us-east-1}.amazonaws.com
spring.mail.port=587
spring.mail.username=${AWS_SES_USERNAME:}
spring.mail.password=${AWS_SES_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================================
# Servlet Configuration
# ============================================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ============================================================================
# WebSocket Configuration
# ============================================================================
spring.websocket.handler.path=/ws

# ============================================================================
# OpenAPI/Swagger Configuration
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ============================================================================
# Actuator Configuration
# ============================================================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=when-authorized

# ============================================================================
# RapidAPI / JSearch Configuration
# ============================================================================
rapidapi.key=${RAPIDAPI_KEY:}
rapidapi.jsearch.host=jsearch.p.rapidapi.com

# ============================================================================
# Additional Properties
# ============================================================================
app.name=HireSmart
app.version=1.0.0
app.timezone=UTC
