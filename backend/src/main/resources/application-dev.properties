# ============================================================================
# HireSmart Development Environment Configuration
# ============================================================================

# Server Configuration
server.port=8080

# Database Configuration - Local Development
spring.datasource.url=jdbc:postgresql://localhost:5432/hiresmart_dev
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hibernate DDL - Auto create for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging - More verbose for development
logging.level.root=INFO
logging.level.com.hiresmart=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT - Extended for development
app.jwt.expiration=604800000

# AWS - Mock/Local
aws.s3.bucket-name=hiresmart-dev-resumes
aws.ses.sender-email=dev@hiresmart.local

# Swagger - Enabled
springdoc.swagger-ui.enabled=true

# CORS for local development
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600
