name: CI/CD — ECS Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [staging, production]
        default: staging

env:
  AWS_REGION:        ap-south-1
  ECR_BACKEND_REPO:  hiresmart-test/backend
  ECR_FRONTEND_REPO: hiresmart-test/frontend
  VITE_API_URL:      http://hiresmart-test-staging-alb-607343882.ap-south-1.elb.amazonaws.com/api/v1

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB:       hiresmart_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run unit tests
        working-directory: ./backend
        run: mvn clean test
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/hiresmart_test
          SPRING_DATASOURCE_USERNAME: test_user
          SPRING_DATASOURCE_PASSWORD: test_password
          SPRING_LIQUIBASE_ENABLED:   false
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

      - name: Build JAR
        working-directory: ./backend
        run: mvn clean package -DskipTests
        env:
          SPRING_LIQUIBASE_ENABLED: false

  # ── Frontend Tests ────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint || true

      - name: Unit tests
        working-directory: ./frontend
        run: npm test -- --run
        continue-on-error: true

      - name: Build (verify no TS errors)
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scanning (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: npm audit
        working-directory: ./frontend
        continue-on-error: true
        run: npm audit --audit-level=moderate

  # ── Build & Push Docker Images to ECR ────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    needs: [backend-test, frontend-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    outputs:
      image_tag:          ${{ steps.tag.outputs.tag }}
      backend_image_uri:  ${{ steps.tag.outputs.backend_uri }}
      frontend_image_uri: ${{ steps.tag.outputs.frontend_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image tag
        id: tag
        run: |
          TAG="sha-${{ github.sha }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "tag=${TAG}"                                                              >> $GITHUB_OUTPUT
          echo "backend_uri=${REGISTRY}/${{ env.ECR_BACKEND_REPO }}:${TAG}"  >> $GITHUB_OUTPUT
          echo "frontend_uri=${REGISTRY}/${{ env.ECR_FRONTEND_REPO }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push:    true
          tags: |
            ${{ steps.tag.outputs.backend_uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:buildcache
          cache-to:   type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:buildcache,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push:    true
          tags: |
            ${{ steps.tag.outputs.frontend_uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:buildcache
          cache-to:   type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:buildcache,mode=max

  # ── Deploy to Staging (ECS) ───────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (ECS)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    env:
      ECS_CLUSTER:  hiresmart-test-staging-cluster
      BACKEND_SVC:  hiresmart-test-staging-backend
      FRONTEND_SVC: hiresmart-test-staging-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition hiresmart-test-staging-backend \
            --query taskDefinition > backend-task-def.json

      - name: Render backend task definition (new image)
        id: backend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-def.json
          container-name:  backend
          image:           ${{ needs.build-and-push.outputs.backend_image_uri }}

      - name: Deploy backend → ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.backend-task-def.outputs.task-definition }}
          service:                    ${{ env.BACKEND_SVC }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition hiresmart-test-staging-frontend \
            --query taskDefinition > frontend-task-def.json

      - name: Render frontend task definition (new image)
        id: frontend-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-def.json
          container-name:  frontend
          image:           ${{ needs.build-and-push.outputs.frontend_image_uri }}

      - name: Deploy frontend → ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:            ${{ steps.frontend-task-def.outputs.task-definition }}
          service:                    ${{ env.FRONTEND_SVC }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test
        run: |
          sleep 10
          curl -f "http://hiresmart-test-staging-alb-607343882.ap-south-1.elb.amazonaws.com/api/v1/health/status" || exit 1
          echo "Smoke test passed"
